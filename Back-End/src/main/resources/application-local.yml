# 로컬 개발 프로파일 — 기존 개발 동작을 그대로 유지
spring:
  jpa:
    hibernate:
      ddl-auto: update      # 개발 편의상 스키마 자동 반영 (운영은 validate)
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        show_sql: true

# 개발 시 SQL·바인딩 파라미터 로그 (운영 프로파일에는 없음 — V3 노출 방지)
logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
