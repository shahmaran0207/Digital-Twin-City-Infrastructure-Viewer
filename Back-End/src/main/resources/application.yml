spring:
  application:
    name: Busan-CityView

  # 활성 프로파일 기본값: local (운영 배포 시 -Dspring.profiles.active=prod 로 전환)
  profiles:
    active: local

  # 프로젝트 루트의 .env 파일에서 DB 접속 정보 로드 (실행 위치에 따라 둘 중 하나가 잡힘)
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    time-zone: Asia/Seoul

server:
  port: 8030

# 공통 로그 레벨 — SQL/바인딩 상세 로그는 프로파일별로 분리 (운영 노출 방지, V3)
logging:
  level:
    root: INFO
